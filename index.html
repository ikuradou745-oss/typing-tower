<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Defense Online - 改修版</title>
    <style>
        /* 前回と同様のスタイル (一部追加・変更あり) */
        :root {
            --bg-color: #0f472a;
            --panel-color: #1a5a3a;
            --text-color: #f5f5f5;
            --accent-green: #4ade80;
            --highlight-yellow: #fbbf24;
            --field-green: #22c55e;
            --earth-brown: #92400e;
            --sky-blue: #0ea5e9;
            --danger-red: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #0d3a1f 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', 'Noto Sans JP', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
            min-height: 100vh;
        }

        #game-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #battle-side {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, #7cb342 50%, #558b2f 100%);
            border-right: 4px solid var(--earth-brown);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset -10px 0 30px rgba(0, 0, 0, 0.3);
        }

        canvas {
            background: linear-gradient(180deg, #87ceeb 0%, #90ee90 50%, #228b22 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border: 3px solid #8b7355;
            cursor: crosshair;
        }

        #typing-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--panel-color) 0%, #1f6e3a 100%);
            padding: 0;
            position: relative;
            border-left: 3px solid var(--field-green);
            box-shadow: inset 5px 0 20px rgba(0, 0, 0, 0.3);
        }

        #header-menu {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            background: rgba(13, 58, 31, 0.95);
            padding: 12px 20px;
            border-bottom: 3px solid var(--field-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-btn {
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--field-green) 0%, #16a34a 100%);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
        }
        .menu-btn.danger {
            background: linear-gradient(135deg, var(--danger-red) 0%, #b91c1c 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.5);
        }
        .menu-btn.danger:hover {
            background: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
        }

        #typing-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 15px;
            background: rgba(34, 197, 94, 0.05);
            padding: 40px 30px;
            position: relative;
        }

        #combo-display {
            font-size: 32px;
            color: var(--highlight-yellow);
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(251, 191, 36, 0.4);
            letter-spacing: 2px;
        }

        #word-display {
            font-size: 56px;
            font-weight: 700;
            color: var(--field-green);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
            letter-spacing: 2px;
        }

        #romaji-display {
            font-size: 38px;
            letter-spacing: 6px;
            color: #cbd5e1;
            font-family: 'Courier New', monospace;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .typed {
            color: var(--highlight-yellow);
            font-weight: bold;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
        }

        #stats-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            background: rgba(13, 58, 31, 0.95);
            padding: 18px 24px;
            border-radius: 10px;
            border: 2px solid var(--field-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        #castle-hp {
            font-size: 16px;
            color: #fca5a5;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #coin-display {
            font-size: 26px;
            color: var(--highlight-yellow);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 750px;
            max-height: 85vh;
            background: linear-gradient(135deg, rgba(26, 90, 58, 0.98) 0%, rgba(31, 110, 58, 0.98) 100%);
            border: 3px solid var(--field-green);
            z-index: 100;
            padding: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: modalSlideIn 0.3s ease-out;
            flex-direction: column;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translate(-50%, -48%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(13, 58, 31, 0.95);
            border-bottom: 2px solid var(--field-green);
            padding: 20px 30px;
        }

        .modal-header h2 {
            color: var(--field-green);
            font-size: 26px;
            margin: 0;
        }

        .close-btn {
            cursor: pointer;
            font-size: 32px;
            color: var(--highlight-yellow);
            background: none;
            border: none;
            padding: 0;
        }

        .tab-bar {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--field-green);
            padding: 0;
            margin: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: rgba(34, 197, 94, 0.1);
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn.active {
            background: rgba(74, 222, 128, 0.2);
            color: var(--field-green);
            border-bottom-color: var(--field-green);
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tower-card {
            background: rgba(34, 197, 94, 0.1);
            border: 2px solid rgba(74, 222, 128, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tower-card:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: var(--field-green);
        }

        .tower-card-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--highlight-yellow);
            color: black;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .shop-item {
            background: rgba(34, 197, 94, 0.1);
            padding: 18px;
            margin: 12px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(74, 222, 128, 0.3);
            transition: all 0.3s;
        }

        .shop-item:hover {
            background: rgba(34, 197, 94, 0.2);
            border-color: var(--field-green);
            transform: translateX(5px);
        }

        .shop-item strong {
            color: var(--field-green);
            font-size: 16px;
            font-weight: 600;
        }

        .shop-item div {
            color: #cbd5e1;
            font-size: 14px;
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            color: #ff6b6b;
            font-size: 100px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8);
        }

        /* タワーセレクターは不要になったので非表示に */
        #tower-selector {
            display: none;
        }

        .settings-item {
            background: rgba(34, 197, 94, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid rgba(74, 222, 128, 0.3);
            margin: 15px 0;
        }

        .settings-item label {
            color: var(--field-green);
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }

        .settings-item input {
            padding: 10px 12px;
            border-radius: 6px;
            border: 2px solid var(--field-green);
            background: rgba(34, 197, 94, 0.1);
            color: var(--text-color);
            width: 100%;
            font-size: 14px;
        }

        .settings-item input:focus {
            outline: none;
            background: rgba(34, 197, 94, 0.2);
        }

        .reset-btn {
            padding: 12px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .level-info {
            background: rgba(34, 197, 94, 0.15);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--field-green);
            margin: 20px 0;
            text-align: center;
        }

        .level-info h3 {
            color: var(--field-green);
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .level-info p {
            color: #cbd5e1;
            margin: 8px 0;
        }

        .level-up-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--field-green) 0%, #16a34a 100%);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin: 20px auto;
            display: block;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3);
            transition: all 0.3s;
        }

        .level-up-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.5);
        }

        /* タワー管理モーダル用スタイル */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="game-over-overlay">GAME OVER</div>

<div id="game-container">
    <div id="battle-side">
        <canvas id="battleCanvas"></canvas>
        <!-- タワーセレクターUIは完全削除 (display:none で非表示) -->
        <div id="tower-selector"></div>
    </div>

    <div id="typing-side">
        <div id="header-menu">
            <button class="menu-btn" onclick="UI.showModal('shop')">🏪 ショップ</button>
            <button class="menu-btn" onclick="UI.showModal('inventory')">🎒 持ち物</button>
            <button class="menu-btn" onclick="UI.showModal('levelUp')">⬆️ レベルアップ</button>
            <button class="menu-btn" onclick="UI.showModal('settings')">⚙️ 設定</button>
        </div>

        <div id="typing-ui">
            <div id="combo-display">COMBO: 0</div>
            <div id="word-display">準備完了</div>
            <div id="romaji-display">PRESS ANY KEY TO START</div>
        </div>

        <div id="stats-bar">
            <div id="castle-hp">城HP: 1000 / 1000</div>
            <div id="coin-display">💰 0</div>
        </div>
    </div>
</div>

<!-- モーダル各種 -->
<div id="modal-shop" class="modal">
    <div class="modal-header">
        <h2>🏪 ショップ</h2>
        <button class="close-btn" onclick="UI.hideModal()">×</button>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="UI.switchShopTab(0)">ノーマル</button>
        <button class="tab-btn" onclick="UI.switchShopTab(1)">ハード</button>
        <button class="tab-btn" onclick="UI.switchShopTab(2)">収入</button>
    </div>
    <div class="modal-content">
        <div id="shop-normal" class="tab-content active"></div>
        <div id="shop-hard" class="tab-content"></div>
        <div id="shop-income" class="tab-content"></div>
    </div>
</div>

<div id="modal-inventory" class="modal">
    <div class="modal-header">
        <h2>🎒 持ち物</h2>
        <button class="close-btn" onclick="UI.hideModal()">×</button>
    </div>
    <div class="modal-content">
        <div id="inventory-content"></div>
    </div>
</div>

<div id="modal-levelUp" class="modal">
    <div class="modal-header">
        <h2>⬆️ レベルアップ</h2>
        <button class="close-btn" onclick="UI.hideModal()">×</button>
    </div>
    <div class="modal-content">
        <div id="level-content"></div>
    </div>
</div>

<div id="modal-settings" class="modal">
    <div class="modal-header">
        <h2>⚙️ 設定</h2>
        <button class="close-btn" onclick="UI.hideModal()">×</button>
    </div>
    <div class="modal-content">
        <div id="settings-content"></div>
    </div>
</div>

<!-- 新規: 設置済みタワー管理モーダル (撤去・入れ替え) -->
<div id="modal-tower-manage" class="modal" style="width: 500px; max-width: 90%; max-height: 60vh;">
    <div class="modal-header">
        <h2>🛠️ タワー管理</h2>
        <button class="close-btn" onclick="UI.hideModal()">×</button>
    </div>
    <div class="modal-content">
        <div id="tower-manage-content"></div>
    </div>
</div>

<!-- 既存のタワー選択モーダル (新規設置時) -->
<div id="modal-tower-select" class="modal" style="width: 500px; max-width: 90%; max-height: 60vh;">
    <div class="modal-header">
        <h2>🛡️ タワーを選択</h2>
        <button class="close-btn" onclick="UI.cancelTowerSelect()">×</button>
    </div>
    <div class="modal-content">
        <div id="tower-select-content"></div>
    </div>
</div>

    // Firebase関連 (変更なし)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDcds20u1-6-nk7710P4xddsa-m1wDL0TQ",
        authDomain: "iikotowaruikoto-d5aa7.firebaseapp.com",
        databaseURL: "https://iikotowaruikoto-d5aa7-default-rtdb.firebaseio.com",
        projectId: "iikotowaruikoto-d5aa7",
        storageBucket: "iikotowaruikoto-d5aa7.firebasestorage.app",
        messagingSenderId: "455780219216",
        appId: "1:455780219216:web:225461fcf24c1a46f69455",
        measurementId: "G-YQD459DBSG"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    window.fbSave = async (userId, data) => {
        try {
            await set(ref(db, 'users/' + userId), data);
        } catch(e) {
            console.log("Save error");
        }
    };

    window.fbLoad = async (userId) => {
        try {
            const snapshot = await get(ref(db, 'users/' + userId));
            return snapshot.exists() ? snapshot.val() : null;
        } catch(e) {
            return null;
        }
    };
</script>

// ----- Dataオブジェクト (修正あり) -----
const Data = {
    coins: 0,
    combo: 0,
    level: 0,
    multiplier: 1,
    gridSize: 9,
    castleHP: 1000,
    maxCastleHP: 1000,
    inventory: ["兵士", "兵士"],
    placedTowers: [],
    playerName: "Player_" + Math.floor(Math.random()*1000),
    selectedTowerIndex: -1,
    pendingTileSelect: null,        // 新規設置時の座標
    managingTower: null,            // 管理対象のタワー情報 { x, y, tower }

    levelCosts: [500000, 3500000, 10000000, 250000000, 500000000],

    async save() {
        const payload = {
            coins: this.coins,
            combo: this.combo,
            level: this.level,
            inventory: this.inventory,
            playerName: this.playerName,
            castleHP: this.castleHP,
            placedTowers: this.placedTowers
        };
        localStorage.setItem('wd_save', JSON.stringify(payload));
        if (window.fbSave) {
            await window.fbSave(this.playerName, payload);
        }
    },

    async load() {
        let firebaseData = null;
        if (window.fbLoad) {
            firebaseData = await window.fbLoad(this.playerName);
        }

        if (firebaseData) {
            this.coins = firebaseData.coins || 0;
            this.combo = firebaseData.combo || 0;
            this.level = firebaseData.level || 0;
            this.inventory = firebaseData.inventory || ["兵士", "兵士"];
            this.playerName = firebaseData.playerName || this.playerName;
            this.castleHP = firebaseData.castleHP || 1000;
            this.placedTowers = firebaseData.placedTowers || [];
        } else {
            const saved = localStorage.getItem('wd_save');
            if (saved) {
                const parsed = JSON.parse(saved);
                this.coins = parsed.coins || 0;
                this.combo = parsed.combo || 0;
                this.level = parsed.level || 0;
                this.inventory = parsed.inventory || ["兵士", "兵士"];
                this.playerName = parsed.playerName || this.playerName;
                this.castleHP = parsed.castleHP || 1000;
                this.placedTowers = parsed.placedTowers || [];
            }
        }
        this.applyLevelEffects();
    },

    applyLevelEffects() {
        this.multiplier = Math.pow(2, this.level);
        this.gridSize = 9 + this.level;
    },

    saveName() {
        const newName = document.getElementById('player-name-input').value;
        if(newName) {
            this.playerName = newName;
            this.save();
            alert("保存しました: " + newName);
        }
    },

    resetData() {
        if(confirm("全てのデータを消去しますか？")) {
            localStorage.clear();
            this.coins = 0;
            this.combo = 0;
            this.level = 0;
            this.inventory = ["兵士", "兵士"];
            this.castleHP = 1000;
            this.placedTowers = [];
            this.save();
            location.reload();
        }
    },
    
    // インベントリから特定のタワーを1つだけ削除する (バグ修正用)
    removeOneFromInventory(towerName) {
        const index = this.inventory.indexOf(towerName);
        if (index > -1) {
            this.inventory.splice(index, 1);
            return true;
        }
        return false;
    }
};

    "大砲": { price: 2500, ct: 3.5, dmg: 100, range: 6, type: "hard" },
    "キャロットファーム": { price: 1000, ct: 10, income: 5, range: 0, type: "income" }
};

const ENEMY_TYPES = {

// ----- Typing (ほぼ変更なし、updateDisplay内のUI更新のみ) -----
const Typing = {
    currentWord: null,
    typedIndex: 0,
    inputBuffer: "",

    init() {
        window.addEventListener('keydown', (e) => this.handleKey(e));
        this.nextWord();
    },

    nextWord() {
        this.currentWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
        this.typedIndex = 0;
        this.inputBuffer = "";
        this.updateDisplay();
    },

    updateDisplay() {
        const wordEl = document.getElementById('word-display');
        const romajiEl = document.getElementById('romaji-display');
        wordEl.innerText = this.currentWord.k;

        let html = "";
        const r = this.currentWord.r;
        for(let i=0; i<r.length; i++) {
            if(i < this.typedIndex) html += `<span class="typed">${r[i]}</span>`;
            else html += `<span>${r[i]}</span>`;
        }
        romajiEl.innerHTML = html;
        document.getElementById('combo-display').innerText = `COMBO: ${Data.combo}`;
        document.getElementById('coin-display').innerText = `💰 ${Math.floor(Data.coins)}`;
    },

    handleKey(e) {
        if(e.key.length !== 1) return;

        const targetChar = this.currentWord.r[this.typedIndex];
        
        // 修正: 入力キーを小文字に統一 (CapsLock対策)
        const pressedKey = e.key.toLowerCase();

        if(pressedKey === targetChar) {
            this.onSuccess();
        } else {
            this.onMiss();
        }
    },

    onSuccess() {
        this.typedIndex++;
        Data.combo++;
        Data.coins += (Data.combo * 5 * Data.multiplier) / 10;
        this.updateDisplay();
        Data.save();

        if(this.typedIndex >= this.currentWord.r.length) {
            this.nextWord();
        }
    },

    onMiss() {
        Data.combo = 0;
        this.updateDisplay();
        Data.save();
    }
};

// ----- Battle (修正: タワークリック時の処理) -----
const Battle = {
    canvas: null,
    ctx: null,
    enemies: [],
    bullets: [],
    tileSize: 40,
    spawnTimer: 0,
    selectedTile: null,

    init() {
        this.canvas = document.getElementById('battleCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.loop();

        this.canvas.addEventListener('mousedown', (e) => this.handleClick(e));
        window.addEventListener('resize', () => this.resize());
    },

    resize() {
        const side = Math.min(window.innerWidth * 0.45, window.innerHeight * 0.85);
        this.canvas.width = side;
        this.canvas.height = side;
        this.tileSize = side / Data.gridSize;
    },

    handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / this.tileSize);
        const y = Math.floor((e.clientY - rect.top) / this.tileSize);
        const center = Math.floor(Data.gridSize / 2);

        if(x === center && y === center) return; // 城マス
        if(x < 0 || x >= Data.gridSize || y < 0 || y >= Data.gridSize) return;

        const existing = Data.placedTowers.find(t => t.x === x && t.y === y);
        if(existing) {
            // 既存タワーをクリック → 管理モーダルを開く
            Data.managingTower = { x, y, tower: existing };
            UI.showTowerManageModal();
        } else {
            // 空きマス → 新規設置モーダル
            Data.pendingTileSelect = {x, y};
            UI.showTowerSelectModal();
        }
    },

    spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        const max = Data.gridSize - 1;
        if(side === 0) { x = Math.random() * max; y = 0; }
        else if(side === 1) { x = max; y = Math.random() * max; }
        else if(side === 2) { x = Math.random() * max; y = max; }
        else { x = 0; y = Math.random() * max; }

        const type = Math.random() > 0.8 ? "speed" : "normal";
        const config = ENEMY_TYPES[type];
        this.enemies.push({
            x, y,
            ...config,
            currentHP: config.hp,
            id: Math.random()
        });
    },

    update() {
        const center = Math.floor(Data.gridSize / 2);

        // 敵の移動と城攻撃
        this.enemies.forEach((en, index) => {
            const dx = center - en.x;
            const dy = center - en.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 0.2) {
                Data.castleHP -= en.atk;
                this.enemies.splice(index, 1);
                if(Data.castleHP <= 0) this.gameOver();
                return;
            }

            const moveStep = (en.speed * 0.2) / 60;
            en.x += (dx / dist) * moveStep;
            en.y += (dy / dist) * moveStep;
        });

        // タワーの攻撃/収入処理
        const now = Date.now();
        Data.placedTowers.forEach(t => {
            t.lastFire = t.lastFire || 0;
            
            if(t.income) {
                if(now - t.lastFire > t.ct * 1000) {
                    Data.coins += t.income / 10;
                    t.lastFire = now;
                }
                return;
            }

            if(now - t.lastFire > t.ct * 1000) {
                const target = this.enemies.find(en => {
                    const d = Math.sqrt(Math.pow(en.x - t.x, 2) + Math.pow(en.y - t.y, 2));
                    return d <= t.range;
                });

                if(target) {
                    this.bullets.push({
                        fromX: t.x + 0.5,
                        fromY: t.y + 0.5,
                        toX: target.x,
                        toY: target.y,
                        progress: 0,
                        speed: 0.15,
                        damage: t.dmg,
                        targetId: target.id
                    });
                    t.lastFire = now;
                }
            }
        });

        // 弾の更新
        this.bullets.forEach((bullet, idx) => {
            bullet.progress += bullet.speed;
            if(bullet.progress >= 1) {
                const target = this.enemies.find(en => en.id === bullet.targetId);
                if(target) {
                    target.currentHP -= bullet.damage;
                    if(target.currentHP <= 0) {
                        this.enemies = this.enemies.filter(e => e !== target);
                    }
                }
                this.bullets.splice(idx, 1);
            }
        });

        // 敵の出現
        this.spawnTimer++;
        if(this.spawnTimer > 120) {
            this.spawnEnemy();
            this.spawnTimer = 0;
        }

        document.getElementById('castle-hp').innerText = `城HP: ${Math.max(0, Data.castleHP)} / ${Data.maxCastleHP}`;
    },

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
        gradient.addColorStop(0, '#87ceeb');
        gradient.addColorStop(0.5, '#90ee90');
        gradient.addColorStop(1, '#228b22');
        this.ctx.fillStyle = gradient;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        this.ctx.strokeStyle = "rgba(0, 0, 0, 0.2)";
        this.ctx.lineWidth = 1;
        for(let i=0; i<=Data.gridSize; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(i * this.tileSize, 0);
            this.ctx.lineTo(i * this.tileSize, this.canvas.height);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(0, i * this.tileSize);
            this.ctx.lineTo(this.canvas.width, i * this.tileSize);
            this.ctx.stroke();
        }

        const center = Math.floor(Data.gridSize / 2);
        const castleX = center * this.tileSize;
        const castleY = center * this.tileSize;
        
        this.ctx.fillStyle = "#8b4513";
        this.ctx.fillRect(castleX + 3, castleY + 3, this.tileSize - 6, this.tileSize - 6);
        
        this.ctx.fillStyle = "#ef4444";
        this.ctx.shadowColor = "rgba(239, 68, 68, 0.6)";
        this.ctx.shadowBlur = 15;
        this.ctx.fillRect(castleX + 8, castleY + 8, this.tileSize - 16, this.tileSize - 16);
        this.ctx.shadowColor = "transparent";
        
        this.ctx.fillStyle = "#ffffff";
        this.ctx.font = "bold 13px Arial";
        this.ctx.textAlign = "center";
        this.ctx.fillText(`HP${Data.castleHP}`, castleX + this.tileSize / 2, castleY + this.tileSize / 2 + 5);

        // タワーの描画
        Data.placedTowers.forEach(t => {
            const towerX = (t.x + 0.5) * this.tileSize;
            const towerY = (t.y + 0.5) * this.tileSize;
            
            if(t.type === "income") {
                this.ctx.fillStyle = "#22c55e";
                this.ctx.shadowColor = "rgba(34, 197, 94, 0.7)";
                this.ctx.shadowBlur = 12;
                const radius = this.tileSize * 0.35;
                this.ctx.fillRect(towerX - radius, towerY - radius, radius * 2, radius * 2);
                
                this.ctx.strokeStyle = "#15803d";
                this.ctx.lineWidth = 1;
                this.ctx.beginPath();
                this.ctx.moveTo(towerX - radius + 5, towerY);
                this.ctx.lineTo(towerX + radius - 5, towerY);
                this.ctx.moveTo(towerX, towerY - radius + 5);
                this.ctx.lineTo(towerX, towerY + radius - 5);
                this.ctx.stroke();
            } else if(t.type === "hard") {
                this.ctx.fillStyle = "#8b5cf6";
                this.ctx.shadowColor = "rgba(139, 92, 246, 0.7)";
                this.ctx.shadowBlur = 12;
                this.ctx.beginPath();
                this.ctx.arc(towerX, towerY, this.tileSize * 0.35, 0, Math.PI*2);
                this.ctx.fill();
                
                this.ctx.strokeStyle = "#6d28d9";
                this.ctx.lineWidth = 4;
                this.ctx.beginPath();
                this.ctx.moveTo(towerX, towerY);
                this.ctx.lineTo(towerX + this.tileSize * 0.3, towerY - this.tileSize * 0.25);
                this.ctx.stroke();
            } else {
                this.ctx.fillStyle = "#3b82f6";
                this.ctx.shadowColor = "rgba(59, 130, 246, 0.7)";
                this.ctx.shadowBlur = 12;
                const shieldSize = this.tileSize * 0.35;
                this.ctx.beginPath();
                this.ctx.moveTo(towerX, towerY - shieldSize);
                this.ctx.lineTo(towerX + shieldSize, towerY - shieldSize * 0.5);
                this.ctx.lineTo(towerX + shieldSize * 0.7, towerY + shieldSize);
                this.ctx.lineTo(towerX, towerY + shieldSize * 1.2);
                this.ctx.lineTo(towerX - shieldSize * 0.7, towerY + shieldSize);
                this.ctx.lineTo(towerX - shieldSize, towerY - shieldSize * 0.5);
                this.ctx.closePath();
                this.ctx.fill();
                
                this.ctx.fillStyle = "#1e40af";
                this.ctx.beginPath();
                this.ctx.arc(towerX, towerY, this.tileSize * 0.1, 0, Math.PI*2);
                this.ctx.fill();
            }
            this.ctx.shadowColor = "transparent";
            
            // クールダウンバー
            const elapsed = Date.now() - (t.lastFire || 0);
            const cooldownPercent = Math.min(elapsed / (t.ct * 1000), 1);
            
            if(cooldownPercent < 1) {
                this.ctx.fillStyle = "rgba(255, 165, 0, 0.7)";
                const barWidth = this.tileSize * 0.6;
                const barHeight = 4;
                this.ctx.fillRect(towerX - barWidth/2, towerY + this.tileSize * 0.45, barWidth * cooldownPercent, barHeight);
                
                this.ctx.strokeStyle = "rgba(255, 165, 0, 0.9)";
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(towerX - barWidth/2, towerY + this.tileSize * 0.45, barWidth, barHeight);
            }
        });

        // 敵の描画
        this.enemies.forEach(en => {
            const enemyX = en.x * this.tileSize;
            const enemyY = en.y * this.tileSize;
            
            this.ctx.fillStyle = en.color;
            this.ctx.shadowColor = en.color.replace(')', ', 0.5)').replace('rgb', 'rgba');
            this.ctx.shadowBlur = 10;
            this.ctx.beginPath();
            this.ctx.arc(enemyX + this.tileSize / 2, enemyY + this.tileSize / 2 + 2, this.tileSize * 0.35, 0, Math.PI*2);
            this.ctx.fill();
            
            this.ctx.fillStyle = "white";
            this.ctx.beginPath();
            this.ctx.arc(enemyX + this.tileSize / 2 - 5, enemyY + this.tileSize / 2 - 2, 3, 0, Math.PI*2);
            this.ctx.fill();
            this.ctx.beginPath();
            this.ctx.arc(enemyX + this.tileSize / 2 + 5, enemyY + this.tileSize / 2 - 2, 3, 0, Math.PI*2);
            this.ctx.fill();
            
            this.ctx.fillStyle = "black";
            this.ctx.beginPath();
            this.ctx.arc(enemyX + this.tileSize / 2 - 5, enemyY + this.tileSize / 2 - 2, 1.5, 0, Math.PI*2);
            this.ctx.fill();
            this.ctx.beginPath();
            this.ctx.arc(enemyX + this.tileSize / 2 + 5, enemyY + this.tileSize / 2 - 2, 1.5, 0, Math.PI*2);
            this.ctx.fill();
            
            this.ctx.shadowColor = "transparent";
            
            this.ctx.fillStyle = "#000000";
            this.ctx.font = "bold 12px Arial";
            this.ctx.textAlign = "center";
            this.ctx.fillText(`HP${en.currentHP}`, enemyX + this.tileSize / 2, enemyY + this.tileSize - 8);
        });

        // 弾の描画
        this.bullets.forEach(bullet => {
            const currentX = bullet.fromX + (bullet.toX - bullet.fromX) * bullet.progress;
            const currentY = bullet.fromY + (bullet.toY - bullet.fromY) * bullet.progress;
            
            this.ctx.fillStyle = "#ffff00";
            this.ctx.shadowColor = "rgba(255, 255, 0, 0.8)";
            this.ctx.shadowBlur = 8;
            this.ctx.beginPath();
            this.ctx.arc(currentX * this.tileSize, currentY * this.tileSize, 4, 0, Math.PI*2);
            this.ctx.fill();
            this.ctx.shadowColor = "transparent";
        });

        // 選択中のタワー (管理モーダル開いているときなどに範囲表示)
        if(this.selectedTile) {
            const t = this.selectedTile.tower;
            const towerX = (t.x + 0.5) * this.tileSize;
            const towerY = (t.y + 0.5) * this.tileSize;
            
            this.ctx.strokeStyle = "#ff8c00";
            this.ctx.lineWidth = 3;
            this.ctx.beginPath();
            this.ctx.arc(towerX, towerY, t.range * this.tileSize, 0, Math.PI*2);
            this.ctx.stroke();
        }
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },

    gameOver() {
        const overlay = document.getElementById('game-over-overlay');
        overlay.style.display = 'flex';
        Data.coins = Math.floor(Data.coins / 2);
        Data.save();
        setTimeout(() => {
            location.reload();
        }, 5000);
    }
};

        else if(type === 'levelUp') this.renderLevelUp();
        else if(type === 'settings') this.renderSettings();
    },

    hideModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        Data.managingTower = null;
        Data.pendingTileSelect = null;
    },

    // 新規: タワー管理モーダル
    showTowerManageModal() {
        this.hideModal();
        const modal = document.getElementById('modal-tower-manage');
        modal.style.display = 'flex';
        this.renderTowerManageContent();
    },

    renderTowerManageContent() {
        const content = document.getElementById('tower-manage-content');
        if (!Data.managingTower) {
            this.hideModal();
            return;
        }
        const t = Data.managingTower.tower;
        content.innerHTML = `
            <div style="padding: 20px; text-align: center;">
                <h3 style="color: var(--field-green); margin-bottom: 15px;">${t.name}</h3>
                <p style="margin-bottom: 10px;">位置: (${t.x}, ${t.y})</p>
                <p style="margin-bottom: 20px;">攻撃力: ${t.dmg || '-'} / 間隔: ${t.ct}秒 / 範囲: ${t.range}</p>
                <div class="action-buttons">
                    <button class="menu-btn" onclick="UI.removeTower()">🗑️ 撤去</button>
                    <button class="menu-btn" onclick="UI.replaceTower()">🔄 入れ替え</button>
                </div>
                <p style="margin-top: 20px; font-size: 12px; color: #cbd5e1;">撤去してもタワーは戻りません。入れ替えは手持ちのタワーと交換します。</p>
            </div>
        `;
    },

    removeTower() {
        if (!Data.managingTower) return;
        const { x, y, tower } = Data.managingTower;
        Data.placedTowers = Data.placedTowers.filter(t => !(t.x === x && t.y === y));
        Data.save();
        this.hideModal();
    },

    replaceTower() {
        if (!Data.managingTower) return;
        if (Data.inventory.length === 0) {
            alert("手持ちにタワーがありません。");
            return;
        }
        // いったん管理モーダルを閉じて、入れ替え用の選択モーダルを開く
        this.hideModal();
        // 新規設置と同じモーダルを流用するが、pendingTileSelectに既存の座標を入れておく
        Data.pendingTileSelect = { 
            x: Data.managingTower.x, 
            y: Data.managingTower.y,
            isReplace: true  // 入れ替えフラグ
        };
        this.showTowerSelectModal();
    },

    showTowerSelectModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        const modal = document.getElementById('modal-tower-select');
        modal.style.display = 'flex';
        this.renderTowerSelectContent();
    },

    cancelTowerSelect() {
        Data.pendingTileSelect = null;
        this.hideModal();
    },

    renderTowerSelectContent() {
        const content = document.getElementById('tower-select-content');
        content.innerHTML = "";

        if(Data.inventory.length === 0) {
            content.innerHTML = "<p style='text-align:center; color: #cbd5e1; padding: 40px 0;'>タワーがありません</p>";
            return;
        }

        const towerCounts = {};
        Data.inventory.forEach(name => {
            towerCounts[name] = (towerCounts[name] || 0) + 1;
        });

        for(let name in towerCounts) {
            const count = towerCounts[name];
            content.innerHTML += `
                <div class="tower-card" onclick="UI.placeTowerOnPendingTile('${name}')">
                    <div>
                        <strong>${name}</strong>
                    </div>
                    <div class="tower-card-count">×${count}</div>
                </div>
            `;
        }
    },

    placeTowerOnPendingTile(towerName) {
        if(!Data.pendingTileSelect) return;
        
        const config = TOWER_TYPES[towerName];
        const { x, y, isReplace } = Data.pendingTileSelect;

        if (isReplace) {
            // 入れ替え処理: 既存タワーを削除し、手持ちに追加、新しいタワーを設置
            const existingIndex = Data.placedTowers.findIndex(t => t.x === x && t.y === y);
            if (existingIndex === -1) {
                alert("エラー: タワーが見つかりません");
                Data.pendingTileSelect = null;
                this.hideModal();
                return;
            }
            const oldTower = Data.placedTowers[existingIndex];
            // 古いタワーをインベントリに戻す
            Data.inventory.push(oldTower.name);
            // 設置リストから削除
            Data.placedTowers.splice(existingIndex, 1);
        }

        // 新しいタワーを設置
        Data.placedTowers.push({
            x, y,
            name: towerName,
            ...config,
            lastFire: 0
        });

        // インベントリから1つだけ削除 (バグ修正)
        Data.removeOneFromInventory(towerName);
        
        Data.pendingTileSelect = null;
        Data.save();
        this.hideModal();
    },

    switchShopTab(tabIndex) {
        this.currentShopTab = tabIndex;
        document.querySelectorAll('#modal-shop .tab-btn').forEach((btn, idx) => {
            if(idx === tabIndex) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.querySelectorAll('#modal-shop .tab-content').forEach((content, idx) => {
            if(idx === tabIndex) content.classList.add('active');
            else content.classList.remove('active');
        });
        this.renderShopContent(tabIndex);
    },

    renderShop() {
        this.currentShopTab = 0;
        document.querySelectorAll('#modal-shop .tab-btn').forEach((btn, idx) => {
            if(idx === 0) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        this.renderShopContent(0);
    },

    renderShopContent(tabIndex) {
        const contents = ['shop-normal', 'shop-hard', 'shop-income'];
        const types = ['normal', 'hard', 'income'];
        
        const content = document.getElementById(contents[tabIndex]);
        content.innerHTML = "";

        for(let name in TOWER_TYPES) {
            const t = TOWER_TYPES[name];
            if(t.type !== types[tabIndex]) continue;

            content.innerHTML += `
                <div class="shop-item">
                    <div>
                        <strong>${name}</strong><br>
                        💰 ${t.price}コイン ${t.dmg ? '| 💥 ' + t.dmg + '': ''} ${t.income ? '| 💸 ' + t.income : ''} | 📏 ${t.range}
                    </div>
                    <button class="menu-btn" onclick="UI.buyTower('${name}')">購入</button>
                </div>
            `;
        }
    },

    buyTower(name) {
        const t = TOWER_TYPES[name];
        if(Data.coins >= t.price) {
            Data.coins -= t.price;
            Data.inventory.push(name);
            Data.save();
            this.renderShopContent(this.currentShopTab);
            // インベントリ表示などがあれば更新 (今回は不要)
            alert("✓ " + name + "を購入しました！");
        } else {
            alert("✗ コインが足りません");
        }
    },

    renderInventory() {
        const content = document.getElementById('inventory-content');
        content.innerHTML = "";
        if(Data.inventory.length === 0) {
            content.innerHTML = "<p style='text-align:center; color: #cbd5e1; padding: 40px 0;'>持ち物がありません</p>";
            return;
        }

        const towerCounts = {};
        Data.inventory.forEach(name => {
            towerCounts[name] = (towerCounts[name] || 0) + 1;
        });

        for(let name in towerCounts) {
            const count = towerCounts[name];
            content.innerHTML += `
                <div class="tower-card">
                    <div>
                        <strong>${name}</strong>
                    </div>
                    <div class="tower-card-count">×${count}</div>
                </div>
            `;
        }
    },

    renderLevelUp() {
        const content = document.getElementById('level-content');
        const nextCost = Data.levelCosts[Data.level] || "MAX";
        const isMax = !Data.levelCosts[Data.level];
        
        content.innerHTML = `
            <div class="level-info">
                <h3>現在のレベル: ${Data.level}</h3>
                ${isMax ? '<p style="color: var(--highlight-yellow);">最大レベルに達しました！</p>' : 
                `<p>次のレベルへの必要コイン</p>
                <p style="color: var(--highlight-yellow); font-weight: 700; font-size: 20px;">${nextCost}</p>`}
            </div>
            <div style="background: rgba(34, 197, 94, 0.1); padding: 20px; border-radius: 10px; border: 2px solid rgba(74, 222, 128, 0.3);">
                <h4 style="color: var(--field-green); margin-bottom: 10px;">報酬:</h4>
                <p style="color: #cbd5e1;">✓ タイピング報酬が2倍になります</p>
                <p style="color: #cbd5e1;">✓ マップが1タイル拡大します（横縦両方）</p>
            </div>
            ${!isMax ? '<button class="level-up-btn" onclick="UI.doLevelUp()">レベルアップする</button>' : ''}
        `;
    },

    doLevelUp() {
        const cost = Data.levelCosts[Data.level];
        if(!cost) return;
        if(Data.coins >= cost) {
            Data.coins -= cost;
            Data.level++;
            Data.applyLevelEffects();
            Battle.resize();
            Data.save();
            this.renderLevelUp();
            alert("🎉 レベルアップしました！");
        } else {
            alert("✗ コインが足りません");
        }
    },

    renderSettings() {
        const content = document.getElementById('settings-content');
        content.innerHTML = `
            <div class="settings-item">
                <label>👤 プレイヤー名</label>
                <input type="text" id="player-name-input" value="${Data.playerName}" placeholder="名前を入力">
                <button class="menu-btn" onclick="Data.saveName()" style="margin-top: 10px; width: 100%;">💾 保存</button>
            </div>
            <div style="background: rgba(34, 197, 94, 0.1); padding: 15px; border-radius: 10px; border: 2px solid rgba(74, 222, 128, 0.3); margin: 20px 0;">
                <p style="color: #cbd5e1; font-size: 14px;">
                    <strong>ゲーム情報</strong><br>
                    レベル: ${Data.level}<br>
                    コイン: ${Math.floor(Data.coins)}<br>
                    グリッドサイズ: ${Data.gridSize}x${Data.gridSize}<br>
                    設置タワー数: ${Data.placedTowers.length}
                </p>
            </div>
            <button class="reset-btn" onclick="Data.resetData()">🗑️ データを消去する</button>
        `;
    },

    // 削除: updateTowerSelector (もう使わない)
    updateTowerSelector() {
        // 何もしない (display:none で非表示のため)
    }
};

// コイン表示更新タイマー
setInterval(() => {
    document.getElementById('coin-display').innerText = `💰 ${Math.floor(Data.coins)}`;
}, 100);

window.onload = async () => {
    await Data.load();
    Typing.init();
    Battle.init();
    // UI.updateTowerSelector(); // 不要なのでコメントアウト
};
</script>

</body>
</html>
