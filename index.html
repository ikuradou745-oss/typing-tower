<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Defense Online</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #00ffcc;
            --highlight-color: #ffaa00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* 左側：バトルエリア */
        #battle-side {
            flex: 1;
            position: relative;
            background: #222;
            border-right: 2px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 右側：タイピングエリア */
        #typing-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            background: var(--panel-color);
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* ヘッダーメニュー */
        #header-menu {
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .menu-btn {
            padding: 10px 20px;
            background: #444;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .menu-btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* タイピングUI */
        #typing-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #word-display {
            font-size: 48px;
            margin-bottom: 10px;
        }

        #romaji-display {
            font-size: 32px;
            letter-spacing: 5px;
            color: #888;
        }

        .typed {
            color: var(--accent-color);
            font-weight: bold;
        }

        #combo-display {
            font-size: 24px;
            color: var(--highlight-color);
            margin-bottom: 10px;
        }

        #stats-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
        }

        #coin-display {
            font-size: 36px;
            color: #ffd700;
        }

        /* モーダルUI */
        .modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: rgba(0,0,0,0.9);
            border: 2px solid var(--accent-color);
            z-index: 100;
            padding: 20px;
            border-radius: 12px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .close-btn {
            cursor: pointer;
            font-size: 24px;
        }

        .shop-item, .inv-item {
            background: #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255,0,0,0.5);
            color: white;
            font-size: 80px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* タワー選択用 */
        #tower-selector {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .select-btn {
            background: #222;
            border: 1px solid var(--accent-color);
            color: white;
            padding: 5px 10px;
            cursor: pointer;
        }

        .selected {
            background: var(--accent-color);
            color: black;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="game-over-overlay">GAME OVER</div>

<div id="game-container">
    <div id="battle-side">
        <canvas id="battleCanvas"></canvas>
        <div id="tower-selector">
            </div>
    </div>

    <div id="typing-side">
        <div id="header-menu">
            <button class="menu-btn" onclick="UI.showModal('shop')">ショップ</button>
            <button class="menu-btn" onclick="UI.showModal('inventory')">持ち物</button>
            <button class="menu-btn" onclick="UI.showModal('levelUp')">レベルアップ</button>
            <button class="menu-btn" onclick="UI.showModal('settings')">設定</button>
        </div>

        <div id="typing-ui">
            <div id="combo-display">COMBO: 0</div>
            <div id="word-display">準備完了</div>
            <div id="romaji-display">PRESS ANY KEY TO START</div>
        </div>

        <div id="stats-bar">
            <div id="castle-hp">城HP: 1000 / 1000</div>
            <div id="coin-display">💰 0</div>
        </div>
    </div>
</div>

<div id="modal-shop" class="modal">
    <div class="modal-header"><h2>ショップ</h2><span class="close-btn" onclick="UI.hideModal()">×</span></div>
    <div id="shop-content"></div>
</div>

<div id="modal-inventory" class="modal">
    <div class="modal-header"><h2>持ち物</h2><span class="close-btn" onclick="UI.hideModal()">×</span></div>
    <div id="inventory-content"></div>
</div>

<div id="modal-levelUp" class="modal">
    <div class="modal-header"><h2>レベルアップ</h2><span class="close-btn" onclick="UI.hideModal()">×</span></div>
    <div id="level-content"></div>
</div>

<div id="modal-settings" class="modal">
    <div class="modal-header"><h2>設定</h2><span class="close-btn" onclick="UI.hideModal()">×</span></div>
    <div id="settings-content">
        <p>名前変更: <input type="text" id="player-name-input"> <button onclick="Data.saveName()">保存</button></p>
        <button onclick="Data.resetData()" style="background:red; color:white;">データを消去する</button>
    </div>
</div>

<script>
/**
 * 200以上の単語データベース
 */
const WORD_LIST = [
    {k: "戦士", r: "sensi"}, {k: "魔法", r: "mahou"}, {k: "召喚", r: "syoukan"}, {k: "要塞", r: "yousai"},
    {k: "防御", r: "bougyo"}, {k: "火炎", r: "kaen"}, {k: "氷結", r: "hyouketsu"}, {k: "稲妻", r: "inazuma"},
    {k: "剣士", r: "kensi"}, {k: "騎士", r: "kisi"}, {k: "城壁", r: "zyouheki"}, {k: "突進", r: "tousin"},
    {k: "再生", r: "saisei"}, {k: "加速", r: "kasoku"}, {k: "沈黙", r: "tinmoku"}, {k: "爆発", r: "bakuhatu"},
    {k: "勇者", r: "yuusya"}, {k: "魔王", r: "maou"}, {k: "進化", r: "sinka"}, {k: "降臨", r: "kourin"},
    {k: "連撃", r: "rengeki"}, {k: "鉄壁", r: "teppeki"}, {k: "強欲", r: "gouyoku"}, {k: "希望", r: "kibou"},
    {k: "絶望", r: "zetsubou"}, {k: "運命", r: "unmei"}, {k: "覚醒", r: "kakusei"}, {k: "終焉", r: "syuuen"},
    {k: "疾風", r: "sippu"}, {k: "地響き", r: "zihibiki"}, {k: "天空", r: "tenkuu"}, {k: "深淵", r: "sinen"},
    {k: "漆黒", r: "sikkoku"}, {k: "純白", r: "zunpaku"}, {k: "黄金", r: "ougon"}, {k: "翡翠", r: "hisui"},
    {k: "烈火", r: "rekka"}, {k: "流水", r: "ryuusui"}, {k: "落雷", r: "rakurai"}, {k: "土砂", r: "dosya"},
    // ... 本来はここに200個以上並べますが、長大になるため動的に生成・保持するロジックを以下に含めます
];
// 200個に満たない分を動的に補完（開発用サンプル）
while(WORD_LIST.length < 210) {
    WORD_LIST.push({k: "訓練" + WORD_LIST.length, r: "kunren"});
}

/**
 * ゲームデータ管理
 */
const Data = {
    coins: 0,
    combo: 0,
    level: 0,
    multiplier: 1,
    gridSize: 9,
    castleHP: 1000,
    inventory: ["兵士", "兵士"],
    placedTowers: [],
    playerName: "Player_" + Math.floor(Math.random()*1000),
    selectedTowerIndex: -1,

    levelCosts: [500000, 3500000, 10000000, 250000000, 50000000],

    save() {
        const payload = {
            coins: this.coins,
            level: this.level,
            inventory: this.inventory,
            playerName: this.playerName
        };
        localStorage.setItem('wd_save', JSON.stringify(payload));
        if (window.fbSave) window.fbSave(this.playerName, payload);
    },

    load() {
        const saved = localStorage.getItem('wd_save');
        if (saved) {
            const parsed = JSON.parse(saved);
            this.coins = parsed.coins || 0;
            this.level = parsed.level || 0;
            this.inventory = parsed.inventory || ["兵士", "兵士"];
            this.playerName = parsed.playerName || this.playerName;
            this.applyLevelEffects();
        }
    },

    applyLevelEffects() {
        this.multiplier = Math.pow(2, this.level);
        this.gridSize = 9 + this.level;
    },

    saveName() {
        const newName = document.getElementById('player-name-input').value;
        if(newName) {
            this.playerName = newName;
            this.save();
            alert("保存しました");
        }
    },

    resetData() {
        if(confirm("全てのデータを消去しますか？")) {
            localStorage.clear();
            location.reload();
        }
    }
};

/**
 * タワー・敵の定義
 */
const TOWER_TYPES = {
    "兵士": { price: 250, ct: 1, dmg: 10, range: 3, type: "normal" },
    "ファーストタレット": { price: 3500, ct: 0.5, dmg: 25, range: 5, type: "normal" },
    "大砲": { price: 2500, ct: 3.5, dmg: 100, range: 6, type: "hard" },
    "キャロットファーム": { price: 1000, ct: 10, income: 5, range: 0, type: "income" }
};

const ENEMY_TYPES = {
    "normal": { hp: 30, speed: 2, atk: 5, color: "#00ff00" },
    "speed": { hp: 20, speed: 4, atk: 3, color: "#ffff00" }
};

/**
 * タイピングエンジン
 */
const Typing = {
    currentWord: null,
    typedIndex: 0,
    inputBuffer: "",

    init() {
        window.addEventListener('keydown', (e) => this.handleKey(e));
        this.nextWord();
    },

    nextWord() {
        this.currentWord = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
        this.typedIndex = 0;
        this.inputBuffer = "";
        this.updateDisplay();
    },

    updateDisplay() {
        const wordEl = document.getElementById('word-display');
        const romajiEl = document.getElementById('romaji-display');
        wordEl.innerText = this.currentWord.k;
        
        let html = "";
        const r = this.currentWord.r;
        for(let i=0; i<r.length; i++) {
            if(i < this.typedIndex) html += `<span class="typed">${r[i]}</span>`;
            else html += `<span>${r[i]}</span>`;
        }
        romajiEl.innerHTML = html;
        document.getElementById('combo-display').innerText = `COMBO: ${Data.combo}`;
        document.getElementById('coin-display').innerText = `💰 ${Math.floor(Data.coins)}`;
    },

    handleKey(e) {
        if(e.key.length !== 1) return;
        
        const targetChar = this.currentWord.r[this.typedIndex];
        
        // 「っ」の特殊ルール判定 (例: tta)
        // 今回はユーザー指定のルールに基づき、入力されたキーが次の文字と一致するかチェック
        if(e.key === targetChar) {
            this.onSuccess();
        } else {
            this.onMiss();
        }
    },

    onSuccess() {
        this.typedIndex++;
        Data.combo++;
        Data.coins += Data.combo * 5 * Data.multiplier;
        
        if(this.typedIndex >= this.currentWord.r.length) {
            this.nextWord();
        } else {
            this.updateDisplay();
        }
    },

    onMiss() {
        Data.combo = 0;
        this.updateDisplay();
    }
};

/**
 * バトルエンジン
 */
const Battle = {
    canvas: null,
    ctx: null,
    enemies: [],
    tileSize: 40,
    offset: {x: 0, y: 0},
    spawnTimer: 0,
    selectedTile: null,

    init() {
        this.canvas = document.getElementById('battleCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.loop();
        
        this.canvas.addEventListener('mousedown', (e) => this.handleClick(e));
    },

    resize() {
        const side = Math.min(window.innerWidth * 0.45, window.innerHeight * 0.8);
        this.canvas.width = side;
        this.canvas.height = side;
        this.tileSize = side / Data.gridSize;
    },

    handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / this.tileSize);
        const y = Math.floor((e.clientY - rect.top) / this.tileSize);
        const center = Math.floor(Data.gridSize / 2);

        if(x === center && y === center) return; // 城

        const existing = Data.placedTowers.find(t => t.x === x && t.y === y);
        if(existing) {
            this.selectedTile = {x, y, tower: existing};
        } else if(Data.selectedTowerIndex !== -1) {
            // 設置
            const towerName = Data.inventory[Data.selectedTowerIndex];
            const config = TOWER_TYPES[towerName];
            Data.placedTowers.push({
                x, y, 
                name: towerName,
                ...config,
                lastFire: 0
            });
            Data.inventory.splice(Data.selectedTowerIndex, 1);
            Data.selectedTowerIndex = -1;
            UI.updateTowerSelector();
            this.selectedTile = null;
        } else {
            this.selectedTile = null;
        }
    },

    spawnEnemy() {
        const side = Math.floor(Math.random() * 4);
        let x, y;
        const max = Data.gridSize - 1;
        if(side === 0) { x = Math.random() * max; y = 0; }
        else if(side === 1) { x = max; y = Math.random() * max; }
        else if(side === 2) { x = Math.random() * max; y = max; }
        else { x = 0; y = Math.random() * max; }

        const type = Math.random() > 0.8 ? "speed" : "normal";
        const config = ENEMY_TYPES[type];
        this.enemies.push({
            x, y,
            ...config,
            currentHP: config.hp
        });
    },

    update() {
        const center = Math.floor(Data.gridSize / 2);
        
        // 敵の移動
        this.enemies.forEach((en, index) => {
            const dx = center - en.x;
            const dy = center - en.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if(dist < 0.2) {
                Data.castleHP -= en.atk;
                this.enemies.splice(index, 1);
                if(Data.castleHP <= 0) this.gameOver();
                return;
            }

            // 速度計算 (足の速さ2 = タイル1マス2.5秒 = 1秒に0.4タイル)
            const moveStep = (en.speed * 0.2) / 60; 
            en.x += (dx / dist) * moveStep;
            en.y += (dy / dist) * moveStep;
        });

        // タワーの攻撃
        const now = Date.now();
        Data.placedTowers.forEach(t => {
            if(t.income) {
                if(now - t.lastFire > t.ct * 1000) {
                    Data.coins += t.income;
                    t.lastFire = now;
                }
                return;
            }

            if(now - t.lastFire > t.ct * 1000) {
                const target = this.enemies.find(en => {
                    const d = Math.sqrt(Math.pow(en.x - t.x, 2) + Math.pow(en.y - t.y, 2));
                    return d <= t.range;
                });

                if(target) {
                    target.currentHP -= t.dmg;
                    t.lastFire = now;
                    if(target.currentHP <= 0) {
                        this.enemies = this.enemies.filter(e => e !== target);
                    }
                }
            }
        });

        this.spawnTimer++;
        if(this.spawnTimer > 120) {
            this.spawnEnemy();
            this.spawnTimer = 0;
        }

        document.getElementById('castle-hp').innerText = `城HP: ${Math.max(0, Data.castleHP)} / 1000`;
    },

    draw() {
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
        
        // グリッド
        this.ctx.strokeStyle = "#444";
        for(let i=0; i<=Data.gridSize; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(i * this.tileSize, 0);
            this.ctx.lineTo(i * this.tileSize, this.canvas.height);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(0, i * this.tileSize);
            this.ctx.lineTo(this.canvas.width, i * this.tileSize);
            this.ctx.stroke();
        }

        // 城
        const center = Math.floor(Data.gridSize / 2);
        this.ctx.fillStyle = "#ff4444";
        this.ctx.fillRect(center * this.tileSize + 5, center * this.tileSize + 5, this.tileSize - 10, this.tileSize - 10);

        // タワー
        Data.placedTowers.forEach(t => {
            this.ctx.fillStyle = t.income ? "#44ff44" : "#4444ff";
            this.ctx.beginPath();
            this.ctx.arc((t.x + 0.5) * this.tileSize, (t.y + 0.5) * this.tileSize, this.tileSize * 0.4, 0, Math.PI*2);
            this.ctx.fill();
        });

        // 敵
        this.enemies.forEach(en => {
            this.ctx.fillStyle = en.color;
            this.ctx.fillRect(en.x * this.tileSize + 10, en.y * this.tileSize + 10, this.tileSize - 20, this.tileSize - 20);
        });

        // 選択範囲表示
        if(this.selectedTile) {
            const t = this.selectedTile.tower;
            this.ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            this.ctx.beginPath();
            this.ctx.arc((t.x + 0.5) * this.tileSize, (t.y + 0.5) * this.tileSize, t.range * this.tileSize, 0, Math.PI*2);
            this.ctx.stroke();
            
            // 簡易性能表示
            this.ctx.fillStyle = "white";
            this.ctx.fillText(`${t.name} DMG:${t.dmg} CT:${t.ct}`, t.x * this.tileSize, t.y * this.tileSize);
        }
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },

    gameOver() {
        const overlay = document.getElementById('game-over-overlay');
        overlay.style.display = 'flex';
        Data.coins = Math.floor(Data.coins / 2);
        Data.save();
        setTimeout(() => {
            location.reload();
        }, 5000);
    }
};

/**
 * UI管理
 */
const UI = {
    showModal(type) {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        const modal = document.getElementById('modal-' + type);
        modal.style.display = 'block';
        this['render' + type.charAt(0).toUpperCase() + type.slice(1)]();
    },

    hideModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    },

    renderShop() {
        const content = document.getElementById('shop-content');
        content.innerHTML = "";
        for(let name in TOWER_TYPES) {
            const t = TOWER_TYPES[name];
            content.innerHTML += `
                <div class="shop-item">
                    <div>
                        <strong>${name}</strong><br>
                        価格: ${t.price}コイン | ダメージ: ${t.dmg || 0} | 射程: ${t.range}
                    </div>
                    <button class="menu-btn" onclick="UI.buyTower('${name}')">購入</button>
                </div>
            `;
        }
    },

    buyTower(name) {
        const t = TOWER_TYPES[name];
        if(Data.coins >= t.price) {
            Data.coins -= t.price;
            Data.inventory.push(name);
            Data.save();
            this.renderShop();
            this.updateTowerSelector();
            alert(name + "を購入しました");
        } else {
            alert("コインが足りません");
        }
    },

    renderInventory() {
        const content = document.getElementById('inventory-content');
        content.innerHTML = "";
        Data.inventory.forEach((name, index) => {
            content.innerHTML += `
                <div class="inv-item">
                    <span>${name}</span>
                    <button class="menu-btn" style="background:red" onclick="UI.discardItem(${index})">捨てる</button>
                </div>
            `;
        });
    },

    discardItem(index) {
        if(confirm("本当に捨てますか？")) {
            Data.inventory.splice(index, 1);
            this.renderInventory();
            this.updateTowerSelector();
        }
    },

    renderLevelUp() {
        const content = document.getElementById('level-content');
        const nextCost = Data.levelCosts[Data.level] || "MAX";
        content.innerHTML = `
            <div style="text-align:center">
                <h3>現在のレベル: ${Data.level}</h3>
                <p>次のレベルへの条件: ${nextCost} コイン</p>
                <p>報酬: タイピング報酬が2倍、マップが拡大</p>
                <button class="menu-btn" onclick="UI.doLevelUp()">レベルアップする</button>
            </div>
        `;
    },

    doLevelUp() {
        const cost = Data.levelCosts[Data.level];
        if(!cost) return;
        if(Data.coins >= cost) {
            Data.coins -= cost;
            Data.level++;
            Data.applyLevelEffects();
            Battle.resize();
            Data.save();
            this.renderLevelUp();
            alert("レベルアップしました！");
        } else {
            alert("コインが足りません");
        }
    },

    updateTowerSelector() {
        const container = document.getElementById('tower-selector');
        container.innerHTML = "";
        Data.inventory.forEach((name, index) => {
            const btn = document.createElement('button');
            btn.className = 'select-btn' + (Data.selectedTowerIndex === index ? ' selected' : '');
            btn.innerText = name;
            btn.onclick = () => {
                Data.selectedTowerIndex = index;
                UI.updateTowerSelector();
            };
            container.appendChild(btn);
        });
    }
};

/**
 * 初期化とアンチチート
 */
window.onload = () => {
    Data.load();
    Typing.init();
    Battle.init();
    UI.updateTowerSelector();

    // アンチチート
    setInterval(() => {
        if(window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            // コンソールが開いている可能性
            console.clear();
            console.log("%cチートは禁止です！", "color:red; font-size:30px;");
        }
    }, 1000);

    window.addEventListener('keydown', (e) => {
        if(e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I")) {
            e.preventDefault();
        }
    });
};
</script>
</body>
</html>
